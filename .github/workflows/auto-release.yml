name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".claude/**"
      - "plan/**"
      - "review-docs/**"
      - ".readme/**"
      - ".gitignore"
      - ".gitattributes"
      - ".github/workflows/**"

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.push.outputs.tag }}
      created: ${{ steps.push.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and push next tag
        id: push
        run: |
          git fetch --tags
          TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          if [ -z "$TAG" ]; then
            NEXT="v0.1.0"
          else
            VERSION="${TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          if git rev-parse "$NEXT" >/dev/null 2>&1; then
            echo "Tag $NEXT already exists, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "$NEXT"
            git push origin "$NEXT"
            echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "Created tag: $NEXT"
          fi

  release:
    name: Release
    needs: tag
    if: needs.tag.outputs.created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    permissions:
      contents: write
