version: '3'

vars:
  BINARY_NAME: difr
  WEB_DIR: web

tasks:
  # === Development ===
  dev:
    desc: "Start development servers (Go + Vite)"
    deps: [dev:backend, dev:frontend]

  dev:backend:
    desc: "Start Go server with Air (hot reload)"
    cmds:
      - air -c .air.toml

  dev:frontend:
    desc: "Start Vite dev server"
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm run dev

  # === Build ===
  build:
    desc: "Build production binary"
    deps: [build:frontend]
    cmds:
      - cp -r {{.WEB_DIR}}/dist internal/embed/dist
      - go build -tags production -ldflags "-s -w" -o {{.BINARY_NAME}} ./cmd/difr
      - rm -rf internal/embed/dist

  build:frontend:
    desc: "Build frontend assets"
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm ci
      - npm run build

  # === Test ===
  test:
    desc: "Run all tests"
    cmds:
      - go test -race ./... -v
      - cd {{.WEB_DIR}} && npm test

  test:backend:
    desc: "Run Go tests"
    cmds:
      - go test -race ./... -v

  test:frontend:
    desc: "Run frontend tests"
    dir: "{{.WEB_DIR}}"
    cmds:
      - npm test

  test:e2e:server:
    desc: "Start E2E test server (production build)"
    deps: [build:frontend]
    cmds:
      - cp -r {{.WEB_DIR}}/dist internal/embed/dist
      - defer: rm -rf internal/embed/dist
      - go run -tags production ./cmd/e2e-server --port {{.CLI_ARGS | default "4444"}}

  test:e2e:
    desc: "Run Playwright E2E tests"
    dir: "{{.WEB_DIR}}"
    cmds:
      - npx playwright test --config=e2e/playwright.config.ts

  test:e2e:headed:
    desc: "Run Playwright E2E tests (visible browser)"
    dir: "{{.WEB_DIR}}"
    cmds:
      - npx playwright test --config=e2e/playwright.config.ts --headed

  test:e2e:ui:
    desc: "Open Playwright UI mode"
    dir: "{{.WEB_DIR}}"
    cmds:
      - npx playwright test --config=e2e/playwright.config.ts --ui

  playwright:install:
    desc: "Install Playwright browsers"
    dir: "{{.WEB_DIR}}"
    cmds:
      - npx playwright install --with-deps chromium

  test:coverage:
    desc: "Run tests with coverage"
    cmds:
      - go test -race ./... -coverprofile=coverage.out && go tool cover -html=coverage.out -o coverage.html
      - cd {{.WEB_DIR}} && npm test -- --coverage

  # === Utilities ===
  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -f {{.BINARY_NAME}}
      - rm -rf {{.WEB_DIR}}/dist
      - rm -rf internal/embed/dist

  lint:
    desc: "Run all linters"
    cmds:
      - go vet ./...
      - cd {{.WEB_DIR}} && npm run lint

  lint:backend:
    desc: "Run Go linters"
    cmds:
      - go vet ./...

  install:
    desc: "Install all dependencies"
    cmds:
      - go mod tidy
      - cd {{.WEB_DIR}} && npm install
